<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에너지맵 v3 — 한국외대 글로벌캠퍼스</title>
<script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=825xps0pwx&submodules=visualization"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Segoe UI',sans-serif;background:#f5f5f5;height:100vh;overflow:hidden;}
#app{display:flex;height:100vh;}

#sidebar{width:320px;flex-shrink:0;background:#fff;display:flex;flex-direction:column;z-index:10;box-shadow:2px 0 12px rgba(0,0,0,0.08);transition:transform .3s ease;}
#sidebar-header{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;}
#sidebar-header h1{font-size:15px;font-weight:700;color:#111;}
#sidebar-header p{font-size:11px;color:#999;margin-top:2px;}

.tab-row{display:flex;border-bottom:1px solid #f0f0f0;background:#fafafa;}
.tab-btn{flex:1;padding:9px 0;font-size:11px;font-weight:600;color:#aaa;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab-btn.active{color:#03c75a;border-bottom-color:#03c75a;background:#fff;}

.panel{flex:1;overflow-y:auto;display:none;}
.panel.active{display:block;}

/* 에너지 랭킹 */
.rank-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.rank-item:hover{background:#f8f8f8;}
.rank-item.active{background:#f0fdf6;border-left-color:#03c75a;}
.rank-num{font-size:11px;font-weight:700;color:#ccc;width:16px;text-align:center;flex-shrink:0;}
.rank-num.r1{color:#ef4444;}.rank-num.r2{color:#f97316;}.rank-num.r3{color:#f59e0b;}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rsub{font-size:10px;color:#999;margin-top:1px;}
.rkcal{font-size:12px;font-weight:700;}
.rrange{font-size:10px;color:#bbb;margin-top:1px;}

/* 배송현황 */
.status-filter{display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid #f5f5f5;}
.sf-btn{flex:1;padding:5px 2px;font-size:10px;font-weight:700;border-radius:5px;border:1.5px solid #e5e5e5;background:#fff;cursor:pointer;color:#888;transition:all .15s;}
.sf-btn.on-complete{background:#dcfce7;border-color:#16a34a;color:#16a34a;}
.sf-btn.on-scan{background:#fef9c3;border-color:#ca8a04;color:#ca8a04;}
.sf-btn.on-wait{background:#fee2e2;border-color:#dc2626;color:#dc2626;}
.sf-btn.on-all{background:#f0f9ff;border-color:#0284c7;color:#0284c7;}
.delivery-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.delivery-item:hover{background:#f8f8f8;}
.d-badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0;}
.d-complete{background:#dcfce7;color:#16a34a;}
.d-scan{background:#fef9c3;color:#ca8a04;}
.d-wait{background:#fee2e2;color:#dc2626;}
.d-info{flex:1;min-width:0;}
.d-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-sub{font-size:10px;color:#999;margin-top:1px;}
.d-cnt{font-size:12px;font-weight:700;color:#555;flex-shrink:0;}

/* 최적화 탭 */
.opt-mode-bar{display:flex;gap:0;padding:10px 14px;border-bottom:1px solid #f0f0f0;background:#fafafa;}
.mode-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:700;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;color:#888;transition:all .15s;}
.mode-btn:first-child{border-radius:6px 0 0 6px;}
.mode-btn:last-child{border-radius:0 6px 6px 0;border-left:none;}
.mode-btn.active-energy{background:#fff3cd;border-color:#f59e0b;color:#d97706;}
.mode-btn.active-group{background:#e0f2fe;border-color:#0284c7;color:#0369a1;}

.opt-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;border-bottom:1px solid #f0f0f0;background:#fafafa;}
.cmp-box{background:#fff;border-radius:8px;padding:8px;border:1px solid #e5e5e5;text-align:center;}
.cmp-box.active{border-color:#03c75a;background:#f0fdf6;}
.cmp-label{font-size:9px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.cmp-val{font-size:14px;font-weight:800;color:#333;}
.cmp-unit{font-size:9px;color:#aaa;}
.cmp-sub{font-size:10px;color:#666;margin-top:3px;}

.opt-header{padding:8px 14px;background:#f0fdf6;border-bottom:1px solid #dcfce7;}
.opt-title{font-size:12px;font-weight:700;color:#166534;}
.opt-sub-text{font-size:10px;color:#4ade80;margin-top:1px;}

.opt-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;}
.opt-item:hover{background:#f8f8f8;}
.opt-step{width:24px;height:24px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-step.energy-step{background:#f59e0b;}
.opt-step.group-step{background:#0284c7;}
.opt-step.done-step{background:#d1fae5;color:#059669;}
.opt-info{flex:1;min-width:0;}
.opt-name{font-size:12px;font-weight:600;}
.opt-detail{font-size:10px;color:#6b7280;margin-top:1px;}
.opt-right{text-align:right;flex-shrink:0;}
.opt-kcal{font-size:11px;font-weight:700;}
.opt-dist{font-size:10px;color:#aaa;margin-top:1px;}

.group-divider{padding:5px 14px;background:#f8fafc;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;}
.group-divider span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}

/* 지도 */
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
#zoom-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.12);pointer-events:none;}
#toggle-bar{position:absolute;top:14px;right:14px;z-index:500;display:flex;gap:5px;flex-wrap:wrap;max-width:200px;justify-content:flex-end;}
.tbtn{background:#fff;border:1px solid #e0e0e0;border-radius:16px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.1);transition:all .15s;}
.tbtn.on{background:#03c75a;color:#fff;border-color:#03c75a;}
.tbtn.on-energy{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.tbtn.on-group{background:#0284c7;color:#fff;border-color:#0284c7;}

#gps-btn{position:absolute;bottom:80px;right:14px;z-index:500;background:#fff;border:1px solid #e0e0e0;border-radius:18px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.12);display:flex;align-items:center;gap:5px;transition:all .15s;}
#gps-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6;}

#legend{position:absolute;bottom:28px;right:14px;z-index:500;background:#fff;border-radius:10px;padding:10px 12px;box-shadow:0 2px 10px rgba(0,0,0,.12);font-size:11px;}
#legend h4{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}

#detail{position:absolute;bottom:20px;left:14px;z-index:500;background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:260px;display:none;}
#dc{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;}
#dn{font-size:14px;font-weight:700;margin-bottom:2px;}
#dm{font-size:11px;color:#888;margin-bottom:10px;}
.dsr{display:flex;gap:6px;margin-bottom:8px;}
.ds{flex:1;background:#f8f8f8;border-radius:7px;padding:7px 8px;}
.dsl{font-size:9px;color:#888;margin-bottom:2px;}
.dsv{font-size:14px;font-weight:700;}
.dsu{font-size:9px;color:#888;}
.drb{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin:6px 0 2px;}
.drf{height:100%;border-radius:2px;}
.drt{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:8px;}
.dir{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f5f5f5;font-size:11px;}
.dir:last-child{border:none;}
.dk{color:#888;}.dv{font-weight:600;color:#333;}

#collapse-btn{position:absolute;top:50%;right:-26px;transform:translateY(-50%);width:26px;height:52px;background:#fff;border:1px solid #e0e0e0;border-left:none;border-radius:0 7px 7px 0;cursor:pointer;font-size:10px;color:#888;display:flex;align-items:center;justify-content:center;box-shadow:2px 0 6px rgba(0,0,0,.08);z-index:10;}
#sidebar.collapsed{transform:translateX(-100%);}

#mob-toggle{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:700;background:#03c75a;color:#fff;border:none;border-radius:22px;padding:11px 22px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(3,199,90,.4);cursor:pointer;}
#mob-close{display:none;}
@media(max-width:640px){
  #collapse-btn{display:none;}
  #mob-toggle{display:block;}
  #mob-close{display:block;position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;color:#999;cursor:pointer;}
  #app{flex-direction:column;}
  #sidebar{width:100%;order:2;position:fixed;bottom:0;left:0;right:0;max-height:62vh;border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .3s ease;z-index:600;}
  #sidebar.open{transform:translateY(0);}
  #sidebar-header{position:relative;}
  #sidebar-header::before{content:'';display:block;width:36px;height:3px;background:#e0e0e0;border-radius:2px;position:absolute;top:7px;left:50%;transform:translateX(-50%);}
  #map-wrap{order:1;height:100vh;width:100%;}
  #detail{width:calc(100% - 28px);bottom:70px;}
  #legend{bottom:70px;}
}
</style>
</head>
<body>
<button id="mob-toggle" onclick="toggleSidebar()">📊 패널 보기</button>
<div id="app">
  <div id="sidebar">
    <button id="collapse-btn" onclick="toggleCollapse()">◀</button>
    <button id="mob-close" onclick="toggleSidebar()">✕</button>
    <div id="sidebar-header">
      <h1>⚡ 에너지맵 <span style="font-size:10px;background:#03c75a;color:#fff;border-radius:3px;padding:1px 5px;font-weight:600;vertical-align:middle;">v3</span></h1>
      <p>한국외대 글로벌캠퍼스 · 에너지 & 배송 최적화</p>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('energy')">🔥 에너지</button>
      <button class="tab-btn" onclick="switchTab('status')">📦 배송현황</button>
      <button class="tab-btn" onclick="switchTab('optimize')">🗺️ 최적순서</button>
    </div>
    <div class="panel active" id="panel-energy"><div id="ranking-list"></div></div>
    <div class="panel" id="panel-status">
      <div class="status-filter">
        <button class="sf-btn on-all" id="sf-all" onclick="filterStatus('all')">전체</button>
        <button class="sf-btn" id="sf-complete" onclick="filterStatus('complete')">✅완료</button>
        <button class="sf-btn" id="sf-scan" onclick="filterStatus('scan')">📷스캔대기</button>
        <button class="sf-btn" id="sf-wait" onclick="filterStatus('wait')">⏳배송대기</button>
      </div>
      <div id="delivery-list"></div>
    </div>
    <div class="panel" id="panel-optimize">
      <!-- 모드 전환 -->
      <div class="opt-mode-bar">
        <button class="mode-btn active-energy" id="mode-energy" onclick="switchOptMode('energy')">
          🔥 에너지 오름차순<br><span style="font-size:9px;font-weight:400">Visentin (2018)</span>
        </button>
        <button class="mode-btn" id="mode-group" onclick="switchOptMode('group')">
          📍 그룹+최단거리<br><span style="font-size:9px;font-weight:400">LOW→MED→HIGH</span>
        </button>
      </div>
      <!-- 비교표 -->
      <div class="opt-compare" id="opt-compare"></div>
      <!-- 순서 리스트 -->
      <div id="optimize-list"></div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="zoom-badge">🏫 캠퍼스 전체</div>
    <button id="gps-btn" onclick="goMyLocation()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      내 위치
    </button>
    <div id="toggle-bar">
      <button class="tbtn on" id="btn-heat" onclick="toggleLayer('heat')">히트맵</button>
      <button class="tbtn on" id="btn-bubble" onclick="toggleLayer('bubble')">버블</button>
      <button class="tbtn" id="btn-route-e" onclick="toggleRoute('energy')">🔥경로</button>
      <button class="tbtn" id="btn-route-g" onclick="toggleRoute('group')">📍경로</button>
    </div>
    <div id="legend">
      <h4>에너지 강도</h4>
      <div style="width:80px;height:7px;border-radius:3px;background:linear-gradient(to right,#22c55e,#84cc16,#f59e0b,#ef4444,#b91c1c);margin-bottom:3px"></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#aaa;width:80px;margin-bottom:8px"><span>낮음</span><span>높음</span></div>
      <h4>경로</h4>
      <div style="display:flex;flex-direction:column;gap:3px">
        <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#555"><div style="width:18px;height:3px;background:#f59e0b;border-radius:2px"></div>에너지순</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#555"><div style="width:18px;height:3px;background:#0284c7;border-radius:2px"></div>그룹+거리</div>
      </div>
    </div>
    <div id="detail">
      <button id="dc" onclick="closeDetail()">×</button>
      <div id="dn"></div><div id="dm"></div>
      <div class="dsr">
        <div class="ds"><div class="dsl">평균 에너지</div><div class="dsv" id="d-mean"></div><div class="dsu">kcal</div></div>
        <div class="ds"><div class="dsl">배송상태</div><div style="margin-top:4px" id="d-status"></div></div>
      </div>
      <div class="drb"><div class="drf" id="d-bar"></div></div>
      <div class="drt"><span id="d-p10"></span><span id="d-p90"></span></div>
      <div class="dir"><span class="dk">최고층</span><span class="dv" id="d-floor"></span></div>
      <div class="dir"><span class="dk">엘리베이터</span><span class="dv" id="d-elev"></span></div>
      <div class="dir"><span class="dk">배송방식</span><span class="dv" id="d-dm"></span></div>
      <div class="dir"><span class="dk">🔥에너지순 순서</span><span class="dv" id="d-erank"></span></div>
      <div class="dir"><span class="dk">📍그룹+거리순 순서</span><span class="dv" id="d-grank"></span></div>
    </div>
  </div>
</div>

<script>

function eColor(kcal){
  const r=kcal/maxKcal;
  if(r<0.15)return'#22c55e';if(r<0.30)return'#84cc16';
  if(r<0.50)return'#f59e0b';if(r<0.70)return'#f97316';
  if(r<0.85)return'#ef4444';return'#b91c1c';
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}

// 알고리즘 1: 에너지 오름차순 (Visentin 2018)
function calcEnergyOrder(startLat=37.336, startLng=127.260){
  const sorted=[...DELIVERY_TARGETS].sort((a,b)=>a.mean_kcal-b.mean_kcal);
  let prevLat=startLat, prevLng=startLng, totalDist=0;
  return sorted.map(d=>{
    const dist=haversine(prevLat,prevLng,d.lat,d.lng);
    totalDist+=dist;
    prevLat=d.lat; prevLng=d.lng;
    return {...d, distFromPrev:dist, cumDist:totalDist};
  });
}

// 알고리즘 2: 그룹(LOW→MED→HIGH) + 그룹 내 Nearest Neighbor
function calcGroupOrder(startLat=37.336, startLng=127.260){
  const groups={LOW:[],MEDIUM:[],HIGH:[]};
  DELIVERY_TARGETS.forEach(d=>groups[d.risk].push({...d}));
  const result=[];
  let curLat=startLat, curLng=startLng, totalDist=0;
  ['LOW','MEDIUM','HIGH'].forEach(g=>{
    const pool=[...groups[g]];
    while(pool.length>0){
      let bestIdx=0, bestDist=Infinity;
      pool.forEach((b,i)=>{
        const d=haversine(curLat,curLng,b.lat,b.lng);
        if(d<bestDist){bestDist=d;bestIdx=i;}
      });
      const chosen=pool.splice(bestIdx,1)[0];
      totalDist+=bestDist;
      result.push({...chosen,distFromPrev:bestDist,cumDist:totalDist,group:g});
      curLat=chosen.lat; curLng=chosen.lng;
    }
  });
  return result;
}

function drawRoute(order, color, markerArr, polyRef){

  markerArr.length=0;

}

const Z_REGION = 14;   // 지역 마커 시작

function updateZoom(){
  const z = map.getZoom();
  const badge = document.getElementById('zoom-badge');

  // 히트맵만 (< Z_REGION)
  if(z < Z_REGION){
    regionMarkers.forEach(m=>m.setMap(null));
    bubbleMarkers.forEach(m=>m.setMap(null));
    statusMarkers.forEach(s=>s.marker.setMap(null));
    routePolyE&&routePolyE.setMap(null);
    routePolyG&&routePolyG.setMap(null);
    routeMarkersE.forEach(m=>m.setMap(null));
    routeMarkersG.forEach(m=>m.setMap(null));
    badge.textContent='🌏 전체 에너지 분포';
    badge.style.background='#fff';

  // 지역 집계 마커 (Z_REGION ~ Z_BUBBLE-1)
  } else if(z < Z_BUBBLE){
    regionMarkers.forEach(m=>m.setMap(map));
    bubbleMarkers.forEach(m=>m.setMap(null));
    statusMarkers.forEach(s=>s.marker.setMap(null));
    routePolyE&&routePolyE.setMap(null);
    routePolyG&&routePolyG.setMap(null);
    routeMarkersE.forEach(m=>m.setMap(null));
    routeMarkersG.forEach(m=>m.setMap(null));
    badge.textContent='🏘️ 지역별 에너지 합산';
    badge.style.background='#fff';

  // 건물 버블 + 경로선만 (Z_BUBBLE ~ Z_ROUTE-1)
  } else if(z < Z_ROUTE){
    regionMarkers.forEach(m=>m.setMap(null));
    bubbleMarkers.forEach(m=>m.setMap(showBubble?map:null));
    statusMarkers.forEach(s=>s.marker.setMap(showBubble?map:null));
    routePolyE&&routePolyE.setMap(showRouteE?map:null);
    routePolyG&&routePolyG.setMap(showRouteG?map:null);
    routeMarkersE.forEach(m=>m.setMap(null));   // 번호는 숨김
    routeMarkersG.forEach(m=>m.setMap(null));
    badge.textContent='🏢 건물별 예측 에너지';
    badge.style.background='#fff';

  // 건물 버블 + 경로선 + 번호 마커 (>= Z_ROUTE)
  } else {
    regionMarkers.forEach(m=>m.setMap(null));
    bubbleMarkers.forEach(m=>m.setMap(showBubble?map:null));
    statusMarkers.forEach(s=>s.marker.setMap(showBubble?map:null));
    routePolyE&&routePolyE.setMap(showRouteE?map:null);
    routePolyG&&routePolyG.setMap(showRouteG?map:null);
    routeMarkersE.forEach(m=>m.setMap(showRouteE?map:null));
    routeMarkersG.forEach(m=>m.setMap(showRouteG?map:null));
    badge.textContent='📍 건물별 배송 순서';
    badge.style.background='#03c75a';
    badge.style.color='#fff';
    badge.style.borderColor='#03c75a';
  }
}

  optMode=mode;
  document.getElementById('mode-energy').className='mode-btn'+(mode==='energy'?' active-energy':'');
  document.getElementById('mode-group').className='mode-btn'+(mode==='group'?' active-group':'');
  renderOptList();
}

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['energy','status','optimize'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
}

// ── 에너지 랭킹 렌더 ─────────────────────────────────────────
const rankList=document.getElementById('ranking-list');
DATA.forEach((d,i)=>{
  const nc=i===0?'r1':i===1?'r2':i===2?'r3':'';
  const col=eColor(d.mean_kcal);
  const el=document.createElement('div');
  el.className='rank-item'; el.dataset.i=i;
  el.innerHTML=`
    <div class="rank-num ${nc}">${i+1}</div>
    <div class="rdot" style="background:${col}"></div>
    <div class="rinfo"><div class="rname">${d.building}</div><div class="rsub">${MODE_KR[d.delivery_mode]} · ${d.max_floor}층</div></div>
    <div style="text-align:right">
      <div class="rkcal" style="color:${col}">${d.mean_kcal.toFixed(1)} kcal</div>
      <div class="rrange">${d.p10_kcal.toFixed(1)}~${d.p90_kcal.toFixed(1)}</div>
    </div>`;
  el.addEventListener('click',()=>{map.setCenter(new naver.maps.LatLng(d.lat,d.lng));map.setZoom(17);setTimeout(()=>openDetail(d,i),200);});
  rankList.appendChild(el);
});

// ── 배송현황 렌더 ─────────────────────────────────────────────
function renderDeliveryList(){
  const list=document.getElementById('delivery-list');
  list.innerHTML='';
  const statusOrder={complete:0,scan:1,wait:2};
  const entries=Object.entries(DELIVERY_STATUS)
    .filter(([,v])=>statusFilter==='all'||v.status===statusFilter)
    .sort((a,b)=>statusOrder[a[1].status]-statusOrder[b[1].status]);
  // 요약
  const all=Object.values(DELIVERY_STATUS);
  const summary=document.createElement('div');
  summary.style.cssText='display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid #f5f5f5;background:#fafafa';
  ['complete','scan','wait'].forEach(s=>{
    const cnt=all.filter(x=>x.status===s).length;
    const labels={complete:'완료',scan:'스캔대기',wait:'배송대기'};
    summary.innerHTML+=`<div style="flex:1;text-align:center;padding:5px 0;border-radius:5px;background:${STATUS_BG[s]}"><div style="font-size:14px;font-weight:800;color:${STATUS_COL[s]}">${cnt}</div><div style="font-size:9px;color:${STATUS_COL[s]}">${labels[s]}</div></div>`;
  });
  list.appendChild(summary);
  if(!entries.length){
    list.innerHTML+=`<div style="padding:20px;text-align:center;color:#aaa;font-size:12px">해당 상태 없음</div>`;return;
  }
  entries.forEach(([name,st])=>{
    const d=DATA.find(x=>x.building===name);if(!d)return;
    const i=DATA.indexOf(d);
    const el=document.createElement('div');
    el.className='delivery-item'; el.dataset.i=i;
    el.innerHTML=`
      <div class="d-badge d-${st.status}">${STATUS_KR[st.status]}</div>
      <div class="d-info"><div class="d-name">${name}</div><div class="d-sub">${d.max_floor}층 · ${st.items.join(', ')}</div></div>
      <div class="d-cnt">${st.count}건</div>`;
    el.addEventListener('click',()=>{map.setCenter(new naver.maps.LatLng(d.lat,d.lng));map.setZoom(17);setTimeout(()=>openDetail(d,i),200);});
    list.appendChild(el);
  });
}

function filterStatus(f){
  statusFilter=f;
  ['all','complete','scan','wait'].forEach(k=>{
    document.getElementById('sf-'+k).className='sf-btn'+(k===f?` on-${k==='all'?'all':k}`:'');
  });
  renderDeliveryList();
  statusMarkers.forEach(s=>{
    const show=(f==='all'||s.status===f)&&showBubble&&map.getZoom()>=ZOOM_TH;
    s.marker.setMap(show?map:null);
  });
}

renderDeliveryList();
renderOptList();

// ── 상세 팝업 ─────────────────────────────────────────────────
function openDetail(d,i){
  const col=eColor(d.mean_kcal);
  const st=DELIVERY_STATUS[d.building];
  document.getElementById('dn').textContent=d.building;
  document.getElementById('dm').textContent=MODE_KR[d.delivery_mode];
  document.getElementById('d-mean').textContent=d.mean_kcal.toFixed(1);
  document.getElementById('d-status').innerHTML=st?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:${STATUS_BG[st.status]};color:${STATUS_COL[st.status]}">${STATUS_KR[st.status]} (${st.count}건)</span>`:`<span style="font-size:10px;color:#aaa">해당없음</span>`;
  document.getElementById('d-bar').style.cssText=`width:${(d.mean_kcal/maxKcal*100).toFixed(0)}%;background:${col};opacity:.85;`;
  document.getElementById('d-p10').textContent=d.p10_kcal.toFixed(1)+' (P10)';
  document.getElementById('d-p90').textContent=d.p90_kcal.toFixed(1)+' (P90)';
  document.getElementById('d-floor').textContent=d.max_floor+'층';
  document.getElementById('d-elev').textContent=d.has_elevator?'있음 🛗':'없음';
  document.getElementById('d-dm').textContent=MODE_KR[d.delivery_mode];
  const er=energyRankMap[d.building], gr=groupRankMap[d.building];
  document.getElementById('d-erank').textContent=er?`${er}번째`:'대상외';
  document.getElementById('d-grank').textContent=gr?`${gr}번째`:'대상외';
  document.getElementById('detail').style.display='block';
  document.querySelectorAll('.rank-item,.delivery-item,.opt-item').forEach(el=>el.classList.remove('active'));
  const t=document.querySelector(`[data-i="${i}"]`);
  if(t){t.classList.add('active');t.scrollIntoView({block:'nearest',behavior:'smooth'});}
}
function closeDetail(){
  document.getElementById('detail').style.display='none';
  document.querySelectorAll('.rank-item,.delivery-item,.opt-item').forEach(el=>el.classList.remove('active'));
}

// ── 레이어 토글 ───────────────────────────────────────────────
function toggleLayer(type){
  if(type==='heat'){
    showHeat=!showHeat;
    heatCircles.forEach(c=>c.setMap(showHeat?map:null));
    document.getElementById('btn-heat').classList.toggle('on',showHeat);
  } else {
    showBubble=!showBubble;
    if(map.getZoom()>=ZOOM_TH){
      bubbleMarkers.forEach(m=>m.setMap(showBubble?map:null));
      statusMarkers.forEach(s=>s.marker.setMap(showBubble?map:null));
    }
    document.getElementById('btn-bubble').classList.toggle('on',showBubble);
  }
}
function toggleRoute(type){
  const z=map.getZoom();
  if(type==='energy'){
    showRouteE=!showRouteE;
    if(showRouteE){
      routePolyE&&routePolyE.setMap(z>=Z_BUBBLE?map:null);
      routeMarkersE.forEach(m=>m.setMap(z>=Z_ROUTE?map:null));
      switchTab('optimize');switchOptMode('energy');
    } else {
      routePolyE&&routePolyE.setMap(null);
      routeMarkersE.forEach(m=>m.setMap(null));
    }
    document.getElementById('btn-route-e').className='tbtn'+(showRouteE?' on-energy':'');
  } else {
    showRouteG=!showRouteG;
    if(showRouteG){
      routePolyG&&routePolyG.setMap(z>=Z_BUBBLE?map:null);
      routeMarkersG.forEach(m=>m.setMap(z>=Z_ROUTE?map:null));
      switchTab('optimize');switchOptMode('group');
    } else {
      routePolyG&&routePolyG.setMap(null);
      routeMarkersG.forEach(m=>m.setMap(null));
    }
    document.getElementById('btn-route-g').className='tbtn'+(showRouteG?' on-group':'');
  }
}

// ── 사이드바 ─────────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar'),btn=document.getElementById('mob-toggle');
  const isOpen=sb.classList.toggle('open');
  btn.textContent=isOpen?'✕ 닫기':'📊 패널 보기';
}
function toggleCollapse(){
  const sb=document.getElementById('sidebar'),btn=document.getElementById('collapse-btn');
  const isC=sb.classList.toggle('collapsed');
  btn.textContent=isC?'▶':'◀';
  btn.style.cssText=isC?'position:fixed;left:0;top:50%;transform:translateY(-50%);width:26px;height:52px;background:#fff;border:1px solid #e0e0e0;border-left:none;border-radius:0 7px 7px 0;cursor:pointer;font-size:10px;color:#555;display:flex;align-items:center;justify-content:center;box-shadow:2px 0 6px rgba(0,0,0,.12);z-index:700;':'';
}
naver.maps.Event.addListener(map,'click',function(){
  const sb=document.getElementById('sidebar');
  if(sb.classList.contains('open'))sb.classList.remove('open');
});

// ── GPS ──────────────────────────────────────────────────────
let myLocMarker=null,myLocCircle=null;
function goMyLocation(){
  const btn=document.getElementById('gps-btn');
  if(!navigator.geolocation){alert('위치 서비스 미지원');return;}
  btn.classList.add('active');
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/></svg> 찾는 중…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
    if(myLocMarker)myLocMarker.setMap(null);
    if(myLocCircle)myLocCircle.setMap(null);
    myLocCircle=new naver.maps.Circle({map,center:new naver.maps.LatLng(lat,lng),radius:acc,fillColor:'#3b82f6',fillOpacity:.10,strokeColor:'#3b82f6',strokeWeight:1,strokeOpacity:.4});
    myLocMarker=new naver.maps.Marker({position:new naver.maps.LatLng(lat,lng),map,icon:{content:`<div style="width:14px;height:14px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 2px #3b82f688;transform:translate(-50%,-50%)"></div>`,anchor:new naver.maps.Point(7,7)}});
    map.setCenter(new naver.maps.LatLng(lat,lng));map.setZoom(17);
    // GPS 위치로 경로 재계산
    startLat=lat; startLng=lng;
    energyOrder=calcEnergyOrder(lat,lng);
    groupOrder=calcGroupOrder(lat,lng);
    energyRankMap=buildRankMap(energyOrder);
    groupRankMap=buildRankMap(groupOrder);
    routePolyE=drawRoute(energyOrder,'#f59e0b',routeMarkersE,routePolyE);
    routePolyG=drawRoute(groupOrder,'#0284c7',routeMarkersG,routePolyG);
    if(showRouteE&&map.getZoom()>=ZOOM_TH){routePolyE.setMap(map);routeMarkersE.forEach(m=>m.setMap(map));}
    if(showRouteG&&map.getZoom()>=ZOOM_TH){routePolyG.setMap(map);routeMarkersG.forEach(m=>m.setMap(map));}
    renderOptList();
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/></svg> 내 위치';
  },err=>{
    btn.classList.remove('active');
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> 내 위치';
    if(err.code===1)alert('위치 권한을 허용해주세요.');
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}
</script>
